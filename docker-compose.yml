name: poe_trade

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: ${CH_DATABASE:-poe_trade}
      CLICKHOUSE_USER: ${CH_USER:-poe_ingest}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-poe_ingest}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "${CH_NATIVE_PORT:-19000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./config/clickhouse/docker_related_config.xml:/etc/clickhouse-server/config.d/docker_related_config.xml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client -q 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  schema_migrator:
    build: .
    entrypoint: ["poe-migrate"]
    command: ["--apply"]
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_USER: ${CH_USER:-poe_ingest}
      POE_CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-poe_ingest}
      POE_CLICKHOUSE_URL: http://clickhouse:8123
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    networks:
      - default

  market_harvester:
    build: .
    command: ["service", "--name", "market_harvester"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: http://clickhouse:8123
    volumes:
      - ./.state:/app/.state
    networks:
      - default

  account_stash_harvester:
    build: .
    command: ["service", "--name", "account_stash_harvester"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: http://clickhouse:8123
    volumes:
      - ./.state:/app/.state
    networks:
      - default

  scanner_worker:
    build: .
    command: ["service", "--name", "scanner_worker"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: http://clickhouse:8123
    volumes:
      - ./.state:/app/.state
    networks:
      - default

  ml_trainer:
    build: .
    command: ["service", "--name", "ml_trainer"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: http://clickhouse:8123
    volumes:
      - ./.state:/app/.state
      - ./artifacts:/app/artifacts
    networks:
      - default

  api:
    build: .
    command: ["service", "--name", "api"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_API_BIND_HOST: "0.0.0.0"
      POE_API_BIND_PORT: "8080"
      POE_API_CORS_ORIGINS: ${POE_API_CORS_ORIGINS:-https://poe.lama-lan.ch}
      POE_API_TRUSTED_ORIGIN_BYPASS: "true"
      POE_CLICKHOUSE_URL: http://clickhouse:8123
    networks:
      - default
      - lama-lan_backend
    restart: unless-stopped

volumes:
  clickhouse_data:

networks:
  default:
  lama-lan_backend:
    external: true
